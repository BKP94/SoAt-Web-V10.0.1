#------------------------------------------------------------------------------
# ora2pg.conf — Oracle → PostgreSQL migration base config
# ใช้กับ: docker run --rm -v ... georgmoser/ora2pg
#   CONFIG_LOCATION=/config/ora2pg/ora2pg.conf
#   OUTPUT_LOCATION=/data/<type>
# หรือ override ด้วย type-specific config (ดู ora2pg_tables.conf เป็นต้น)
#------------------------------------------------------------------------------

# Oracle connection
ORACLE_DSN        dbi:Oracle:host=192.168.101.29;sid=pean;port=1521
ORACLE_USER       dbo
ORACLE_PWD        xsqlx

# Oracle schema to export (uppercase = Oracle convention)
SCHEMA            DBO

# Target PostgreSQL version
PG_VERSION        15

# Character encoding — must match Oracle DB actual charset (TH8TISASCII)
# Oracle will convert TH8TISASCII → UTF8 when NLS_LANG = AL32UTF8
NLS_LANG          AMERICAN_AMERICA.AL32UTF8
BINMODE           utf8

#------------------------------------------------------------------------------
# Type mapping: Oracle → PostgreSQL
#------------------------------------------------------------------------------
DATA_TYPE         NUMBER:numeric,VARCHAR2:varchar,NVARCHAR2:varchar,CHAR:char,NCHAR:char,DATE:timestamp,CLOB:text,BLOB:bytea,LONG:text,RAW:bytea,LONG RAW:bytea,XMLTYPE:text,FLOAT:double precision,BINARY_FLOAT:float,BINARY_DOUBLE:double precision,INTEGER:integer,SMALLINT:smallint

# Preserve Oracle names (0 = lowercase — PostgreSQL convention)
PRESERVE_CASE     0

# Replace Oracle-specific syntax
REPLACE_AS_SUBQUERY     1
REPLACE_ZERO_DATE       1960-01-01 00:00:00
NULL_EQUAL_EMPTY        1

#------------------------------------------------------------------------------
# Output settings
#------------------------------------------------------------------------------
# Export schema prefix (dbo.) — set to 1 to include schema prefix on all objects
EXPORT_SCHEMA     0

# Don't export tablespace info (not applicable in PostgreSQL)
TABLESPACE_AS_FILLFACTOR    0

# Remove STORAGE and other Oracle-specific clauses
DISABLE_TABLE_STORAGE     1
DISABLE_INDEX_STORAGE     1

# Skip Oracle system tables
EXCLUDED_TABLES    PLAN_TABLE SYS_TEMP_FBT

#------------------------------------------------------------------------------
# PL/SQL → PL/pgSQL conversion
#------------------------------------------------------------------------------
# Convert PL/SQL to PL/pgSQL (functions/triggers/packages)
PLSQL_PGSQL       1

# Convert pka_com_login.login_id references — will be done manually post-extract
# (replace with current_setting('app.login_id', true))

# Don't stop on PL/SQL conversion errors
STOP_ON_ERROR     0

# Output one file per object (set in type-specific configs)
# FILE_PER_TABLE    1  ← set in tables config
# FILE_PER_FUNCTION 1  ← set in functions config

# Don't include COMMENT ON TABLE/COLUMN (encoding issues with TH8TISASCII comments)
# Uncomment to skip: SKIP  COMMENT

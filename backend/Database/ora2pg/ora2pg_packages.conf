# ora2pg_packages.conf — PACKAGE extraction config (Oracle packages → PG functions)
# Each Oracle package becomes its own subfolder under Database/Functions/
# Usage:
#   docker run --rm \
#     -v ".../Database/ora2pg/ora2pg_packages.conf:/config/ora2pg.conf:ro" \
#     -v ".../Database/Functions:/data" \
#     georgmoser/ora2pg

ORACLE_DSN        dbi:Oracle:host=192.168.101.29;sid=pean;port=1521
ORACLE_USER       dbo
ORACLE_PWD        xsqlx
SCHEMA            DBO
PG_VERSION        15
NLS_LANG          AMERICAN_AMERICA.AL32UTF8
BINMODE           utf8

PRESERVE_CASE     0
PLSQL_PGSQL       1
STOP_ON_ERROR     0
EXPORT_SCHEMA     0

TYPE              PACKAGE
FILE_PER_FUNCTION 1

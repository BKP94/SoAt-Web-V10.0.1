# ora2pg_triggers.conf — TRIGGER extraction config
# Each trigger → one file. ora2pg auto-splits into FUNCTION + CREATE TRIGGER.
# Usage:
#   docker run --rm \
#     -v ".../Database/ora2pg/ora2pg_triggers.conf:/config/ora2pg.conf:ro" \
#     -v ".../Database/Triggers:/data" \
#     georgmoser/ora2pg

ORACLE_DSN        dbi:Oracle:host=192.168.101.29;sid=pean;port=1521
ORACLE_USER       dbo
ORACLE_PWD        xsqlx
SCHEMA            DBO
PG_VERSION        15
NLS_LANG          AMERICAN_AMERICA.AL32UTF8
BINMODE           utf8

PRESERVE_CASE     0
PLSQL_PGSQL       1
STOP_ON_ERROR     0
EXPORT_SCHEMA     0

OUTPUT            output.sql
TYPE              TRIGGER
FILE_PER_FUNCTION 1
